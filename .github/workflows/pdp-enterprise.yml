name: PDP Parallel Check

on:
  workflow_dispatch:

jobs:

  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate matrix
        id: generate
        run: |
          matrix=$(jq -c '[.data[] | {brand: .brand, code: .assortmentCode}]' productPageUrls.json)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT


  run-check:
    needs: build-matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: |
          node checkPdpPages.js "${{ matrix.brand }}" "${{ matrix.code }}"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.brand }}-${{ matrix.code }}
          path: "*.json"


  merge-results:
    needs: run-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Collect JSON files
        run: |
          mkdir final
          find results -name "*.json" -exec cp {} final/ \;

      - name: Commit results to repository
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          mkdir -p results
          cp final/*.json results/

          git add results/
          git diff --cached --quiet || git commit -m "Add PDP results"
          git push